name: 'Continuous Deployment'

on:
  workflow_call:
    inputs:
      environment:
        description: 'The environment for the workflow'
        default: 'production'
        required: true
        type: string
    secrets:
      CLOUDFLARE_API_TOKEN:
        description: 'Cloudflare API token for Workers deployment'
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        description: 'Cloudflare account ID'
        required: true

jobs:
  deploy:
    permissions:
      contents: read
      deployments: write
    name: 'Deploy to Cloudflare Workers'
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v6
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      # nitro writes the merged wrangler config to .output/server/wrangler.json via
      # deployConfig (see nuxt.config.ts) — point --config at it.
      - name: Deploy to Cloudflare Workers
        run: pnpm exec wrangler deploy --config .output/server/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
